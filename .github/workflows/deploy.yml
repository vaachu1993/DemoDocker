name: Deploy Spring Boot to Docker Hub

on:
  push:
    branches: [ "main" ] # Tự động chạy khi bạn push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ repo (Sử dụng Robot Checkout)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Thiết lập Java (Cần thiết để build file .jar của Spring Boot)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Build dự án Java thành file .jar
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 4. Đăng nhập Docker Hub (Sử dụng Robot Docker Login)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Image & Push lên Docker Hub (Sử dụng Robot Build and Push)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Gắn tags khớp với Docker Hub của bạn: triminh2412/duanjava
          tags: |
            triminh2412/duanjava:latest
            triminh2412/duanjava:${{ github.sha }}
